    M400
    INNER_CUTOFF_BASE_DISCARD
    INNER_ROUGHLY_CLEAN_NOZZLE_BASE_DISCARD ACTION=4
    INNER_DISCARD_FILAMENT_BASE_DISCARD
    MOVE_TO_XY_IDLE_POSITION_EXTRUDER
    M107
    RESTORE_GCODE_STATE NAME=preextrude
    SET_ACTION_CODE ACTION=IDLE


[gcode_macro INNER_DETECT_NOZZLE_STAGE_1]
gcode:
    {% set retract_e = params.RETRACT | default(0) %}
    SAVE_GCODE_STATE NAME=DETECT_NOZZLE
    {% if retract_e != 0 %}
        _CLIENT_RETRACT
    {% endif %}
    G91
    M204 S10000
    G1 Z2 F2000
    G90
    G1 X195 Y16 F30000
    M400

[gcode_macro INNER_DETECT_NOZZLE_STAGE_2]
gcode:
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set retract = client.cancel_retract | default(5.0) | abs %}
    {% set extrude_e = params.EXTRUDE | default(0) %}
    {% set pos_x = params.X | default(9999999) | float %}
    {% set pos_y = params.Y | default(9999999) | float %}
    {% set pos_z = params.Z | default(9999999) | float %}

    {% if pos_x < 9999990 and pos_y < 9999990 and pos_z < 9999990 %}
        G90
        G1 X{pos_x} Y{pos_y} F30000
        # G1 Z{pos_z} F2000
        {% if extrude_e != 0 %}
            _CLIENT_EXTRUDE
        {% endif %}
        RESTORE_GCODE_STATE NAME=DETECT_NOZZLE
    {% endif %}

[gcode_macro CONTROL_EXTRUDE_ACTION]
gcode:
    {% set extruder_default = printer[printer.toolhead.extruder].extruder_index %}
    {% set extruder_index = params.EXTRUDER | default(extruder_default) | int %}
    {% set nozzle_diameter = printer[printer.toolhead.extruder].nozzle_diameter %}
    {% if extruder_index == 0 %}
        {% set nozzle_diameter = printer['extruder'].nozzle_diameter %}
    {% else %}
        {% set nozzle_diameter = printer['extruder%d' % (extruder_index)].nozzle_diameter %}
    {% endif %}
    {% set filament_soft = False %}
    {% if printer.print_task_config['filament_soft'][extruder_index] == True %}
        {% set filament_soft = True %}
    {% endif %}

    {% if nozzle_diameter < 0.3 %}
        {% if filament_soft == True %}
            M83
            G1 E30 F60
        {% else %}
            M83
            G1 E30 F210
        {% endif %}
    {% else %}
        {% if filament_soft == True %}
            M83
            G1 E30 F200
        {% else %}
            M83
            G1 E30 F300
        {% endif %}
    {% endif %}

[gcode_macro CONTROL_RETRACT_ACTION]
gcode:
    {% set only_retract = params.ONLY_RETRACT | default(0) | int %}
    {% set extruder_default = printer[printer.toolhead.extruder].extruder_index %}
    {% set extruder_index = params.EXTRUDER | default(extruder_default) | int %}
    {% set nozzle_diameter = printer[printer.toolhead.extruder].nozzle_diameter %}
    {% if extruder_index == 0 %}
        {% set nozzle_diameter = printer['extruder'].nozzle_diameter %}
    {% else %}
        {% set nozzle_diameter = printer['extruder%d' % (extruder_index)].nozzle_diameter %}
    {% endif %}
    {% set filament_soft = 0 %}
    {% if printer.print_task_config['filament_soft'][extruder_index] == True %}
        {% set filament_soft = 1 %}
    {% endif %}
    {% set filament_soft = params.SOFT | default(filament_soft) | int %}

    {% if only_retract == 0 %}
        {% if nozzle_diameter < 0.3 %}
            {% if filament_soft != 0 %}
                M83
                G1 E5 F60
                G1 E-27 F2700
                G1 E-5.5 F40
                # G4 P200
                G1 E-37.5 F1500
            {% else %}
                M83
                G1 E57 F210
                G1 E3 F300
                G1 E-27 F2700
                G1 E-5.5 F40
                # G4 P200
                G1 E-37.5 F1500
            {% endif %}
        {% else %}
            {% if filament_soft != 0 %}
                M83
                G1 E5 F600
                G1 E-27 F2700
                G1 E-5.5 F40
                # G4 P200
                G1 E-37.5 F1500
            {% else %}
                M83
                G1 E57 F400
                G1 E3 F1500
                G1 E-27 F2700
                G1 E-5.5 F40
                # G4 P200
                G1 E-37.5 F1500
            {% endif %}
        {% endif %}
    {% else %}
        M83
        G1 E-10 F300
    {% endif %}


