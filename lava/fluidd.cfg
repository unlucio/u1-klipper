# ====================== Gcode macro for internal use only ============================
[gcode_macro INNER_ROUGHLY_CLEAN_NOZZLE_BASE_DISCARD]
gcode:
    {% set accel = params.ACCEL | default(10000) | int %}
    {% set speed = params.SPEED | default(10000) | int %}
    {% set action = params.ACTION | default(4) | int %}

    G91
    M204 S{accel}
    G1 F{speed}

    {% if printer.toolhead.extruder == 'extruder' %}
        G1 Y10
        {% if action == 1 %}
            G1 X-1 Y15
            G1 X-4 Y-10
            G1 X5 Y-5
        {% elif action == 2 %}
            G1 X-5 Y10
            G1 X1 Y5
            G1 X4 Y-15
        {% elif action == 3 %}
            G1 X-1 Y15
            G1 X-2 Y-15
            G1 X-2 Y15
            G1 X5 Y-15
        {% else %}
            G1 X-1 Y15
            G1 Y-15
            G1 X-1 Y15
            G1 Y-15
            G1 X-1 Y15
            G1 Y-15
            G1 X-1 Y15
            G1 X-1 Y-8
            G1 X5 Y-7
        {% endif %}
        G1 Y-10
    {% else %}
        G1 Y10
        {% if action == 1 %}
            G1 X1 Y15
            G1 X4 Y-10
            G1 X-5 Y-5
        {% elif action == 2 %}
            G1 X5 Y10
            G1 X-1 Y5
            G1 X-4 Y-15
        {% elif action == 3 %}
            G1 X1 Y15
            G1 X2 Y-15
            G1 X2 Y15
            G1 X-5 Y-15
        {% else %}
            G1 X1 Y15
            G1 Y-15
            G1 X1 Y15
            G1 Y-15
            G1 X1 Y15
            G1 Y-15
            G1 X1 Y15
            G1 X1 Y-8
            G1 X-5 Y-7
        {% endif %}
        G1 Y-10
    {% endif %}

[gcode_macro INNER_DISCARD_FILAMENT_BASE_DISCARD]
variable_random_pos: 1
