    {% set accel = params.ACCEL | default(10000) | int %}
    {% set speed = params.SPEED | default(5000) | int %}
    {% set random_position = random_pos % 6 %}
    {% set discard_position = 5.5 + random_position * 0.5 %}
    G91
    M204 S{accel}
    G1 F{speed}
    G1 Y-{discard_position}
    {% if printer.toolhead.extruder == 'extruder' %}
        G1 X-10
        G1 X10
        G1 X-10
        G1 X10
    {% else %}
        G1 X10
        G1 X-10
        G1 X10
        G1 X-10
    {% endif %}
    G1 Y{discard_position}
    SET_GCODE_VARIABLE MACRO=INNER_DISCARD_FILAMENT_BASE_DISCARD VARIABLE=random_pos VALUE={random_pos + 1}

